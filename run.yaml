apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: tax-calculator-pipeline-run
  namespace: default
spec:
  pipelineRef:
    name: tax-calculator-pipeline
  serviceAccountName: pipeline-sa
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: source-pvc
  params:
    - name: image-name
      value: tax-calculator:latest
  taskRunSpecs:
    - pipelineTaskName: npminstall
      taskServiceAccountName: pipeline-sa
    - pipelineTaskName: tests
      taskServiceAccountName: pipeline-sa
    - pipelineTaskName: build
      taskServiceAccountName: pipeline-sa
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: source-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-role
  namespace: default
rules:
  - apiGroups: ['']
    resources: ['pods', 'pods/logs']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['tekton.dev']
    resources: ['tasks', 'taskruns', 'pipelines', 'pipelineruns']
    verbs: ['get', 'list', 'watch', 'create']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-rolebinding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-role
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: default
